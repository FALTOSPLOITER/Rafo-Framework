name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint (flake8 + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint tools
        run: pip install flake8 black
      - name: Run flake8
        run: flake8 . --count --max-line-length=120 --exclude=venv,.git
      - name: Check black formatting
        run: black --check --line-length 120 . --exclude '/(venv|\.git)/'

  security:
    name: Security audit (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit
        run: bandit -r . -x ./venv,./tests -ll

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install colorama pytest pytest-mock
      - name: Run tests
        run: pytest tests/ -v --tb=short
