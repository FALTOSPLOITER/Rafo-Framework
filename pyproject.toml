[tool.black]
line-length = 120
skip-string-normalization = true
target-version = ["py39", "py310", "py311"]
exclude = '''
/(
    \.git
  | venv
  | \.eggs
)/
'''

[tool.flake8]
max-line-length = 120
exclude = ["venv", ".git", "__pycache__"]
ignore = ["E501", "W503"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
